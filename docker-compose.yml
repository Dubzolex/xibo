version: "3.8"

services:
  nginx:
    image: nginx:1.29-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - /srv/dev-disk-by-uuid-4d1eafa4-ed40-4d69-bf8c-6784eb88a3ce/xibo/app:/var/www/html:ro
      - /srv/dev-disk-by-uuid-4d1eafa4-ed40-4d69-bf8c-6784eb88a3ce/xibo/screen:/var/www/html/images:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - webnet
    restart: unless-stopped

  php:
    user: "1000:100"
    build: .
    container_name: php
    volumes:
      - /srv/dev-disk-by-uuid-4d1eafa4-ed40-4d69-bf8c-6784eb88a3ce/xibo/app:/var/www/html
      - /srv/dev-disk-by-uuid-4d1eafa4-ed40-4d69-bf8c-6784eb88a3ce/xibo/screen:/var/www/html/images
    networks:
      - webnet
    restart: unless-stopped

  db:
    image: mariadb:11
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: digital_signage
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - webnet
    restart: unless-stopped

networks:
  webnet:
    driver: bridge

volumes:
  db_data:
