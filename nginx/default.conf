server {
  listen 80; 
  server_name localhost;

  client_max_body_size 100M;
  
  root /var/www/html/public/;
  index index.html; 
  
  location / { 
    try_files $uri $uri/ /=404; 
  } 
  
  location ~ \.php$ { 
    include fastcgi_params; 
    fastcgi_pass php:9000; 
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name; 
  } 
  
  location /images/ { 
    autoindex on; 
  }

  location ~ /\. { 
    deny all; 
  } 

  
} 
