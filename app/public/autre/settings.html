<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./styles.css" rel="styleSheet">
    <title>Settings</title>
</head>
<body>
    <header class="fx-col">
        <div class="fx-row gap-20">
            <div class="fx-row jc-center">
                <h2>Digital Signage</h2>
            </div>
            <nav class="fx-row jc-evenly grow ai-center">
                <div><a href="./"><h4>Screens Preview</h4></a></div>
                <div><a href="./screen/"><h4>Live</h4></a></div>
                <div><a href="dashboard.html"><h4>History</h4></a></div>
                <div><a href="settings.html"><h4>Settings</h4></a></div>
            </nav>
        </div>
    </header>
    <section class="fx-col gap-40">
        <div class="fx-row jc-center">
            <div class="fx-col w-1000 gap-40">
                <div class="fx-row jc-evenly gap-20">
                    <button id="add">Add</button>
                    <button id="edit">Edit</button>
                    <button id="delete">Delete</button>
                </div>
            </div>
        </div>
        <div class="fx-row jc-center">
            <div class="fx-col w-1000 gap-40">
                <div class="fx-row jc-between tableau">
                    <h3></h3>
                    <h3>id</h3>
                    <h3>Name</h3>
                    <h3>Page</h3>
                    <h3>Duration</h3>
                    <h3>Actived</h3>
                    <h3>Managed</h3>
                </div>
                <div id="container" class="fx-col gap-20"></div>
            </div>
        </div>
    </section>
    
<script>

    let config = null

    const readConfig = async () => {
        //config
        const file = await fetch('/backend/config.json', { cache: 'no-store' });
        config = await file.json()
        await showElement()
    }
    readConfig()

    const showElement = async () => {
        const div = document.getElementById("container")
        if(div){
            div.innerHTML = config.map(c => {
                return `
                <div class="fx-row jc-between gap-20 tableau">
                    <div class="fx-row jc-start">
                        <input type="checkbox" id="${c.id}">
                    </div>
                    <div>${c.id}</div>
                    <div>${c.name}</div>
                    <div>${c.page}</div>
                    <div>${c.duration} s</div>
                    <div>${c.actived}</div>
                    <div>${c.managed}</div>
                </div>
            `
            }).join("")    
        }
    }

const db = async () => {
    const add = [{
        name: "Borne",
        page: "diaporama.html",
        duration: 10
    }]

    const update = [
        {
            id: 1,
            name: "Borne Tactile",
            page: "diaporama.html",
            duration: 10,
            actived: 1,
            managed: 1,
        },
        {
            id: 2,
            name: "Reflex",
            page: "diaporama.html",
            duration: 10,
            actived: 1,
            managed: 1,
        },
        {
            id: 3,
            name: "Fabric",
            page: "diaporama.html",
            duration: 10,
            actived: 1,
            managed: 1,
        },
        {
            id: 4,
            name: "Chantier IP",
            page: "diaporama.html",
            duration: 10,
            actived: 0,
            managed: 1,
        },
        {
            id: 5,
            name: "Test",
            page: "diaporama.html",
            duration: 10,
            actived: 0,
            managed: 1,
        }
    ]

    const params = new URLSearchParams({ action: "updateScreens" });

    const res = await fetch(`/backend/api.php?${params.toString()}`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Cache-Control": "no-store"
        },
        body: JSON.stringify(update),
        cache: "no-store"
    });

    if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Erreur API addScreens (${res.status}): ${txt}`);
    }

    const result = await res.json();
    console.log("addScreens:", result);

    const params2 = new URLSearchParams({ action: "getScreens" });

    const res2 = await fetch(`/backend/api.php?${params2.toString()}`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Cache-Control": "no-store"
        },
        body: JSON.stringify(update),
        cache: "no-store"
    });

    if (!res2.ok) {
    const txt = await res2.text();
    throw new Error(`Erreur API addScreens (${res2.status}): ${txt}`);
    }

    const results = await res2.json();
    console.log("getScreens:", results);

}

db()

















</script>
