<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaporama</title>
</head>
<body>
    <div class="container">
        <div id="media" class="media"></div>
    </div>
    
<script>
let config = null
let media = []

const TRANSITION_DURATION = 500 // ms

const initApp = async () => {
    const params = new URLSearchParams(window.location.search)
    const s = params.get("screen")

    if (!s) {
        window.location.href = "index.html"
        return
    }

    localStorage.setItem("screen", s)
    //console.log("Screen :", s)

    await readConfig()
}

const readConfig = async () => {
    try {
        const file = await fetch("../config.json", { cache: "no-store" })
        const data = await file.json()
        const id = localStorage.getItem("screen")
        config = data.find(p => p.id == id)

        if (!config) throw "Config introuvable"
        //console.log("Config :", config)

        await loadMedia()

    } catch (e){
        console.error(e)
    }
}

const loadMedia = async () => {
    try {
        const file = await fetch(`../media.php?dir=${encodeURIComponent(config.name)}`, { cache: "no-store" })
        media = await file.json()
        //console.log("Media :", media)

        if (Array.isArray(media) && media.length > 0) {
            await showMedia()
            return
        }

    } catch (e) {
        console.error(e)
    }

    noMediaFound()
    await wait(10000)
    readConfig()
}

const showMedia = async () => {
    const container = document.getElementById("media")

    for (let item of media) {
        const url = `../images/${config.name}/${item}`

        if (!(await fileExists(url))) {
            console.warn("Media supprimé :", item)
            continue
        }

        // IMAGE
        if (item.match(/\.(png|jpg|jpeg)$/i)) {
            const img = document.createElement("img")
            img.src = url
            await showElement(container, img, 5000)
        }

        // VIDEO
        if (item.match(/\.(mp4)$/i)) {
            const video = document.createElement("video")
            video.src = url
            video.autoplay = true
            video.muted = true
            video.playsInline = true

            await showElement(container, video)

            await new Promise(resolve => {
                video.onended = resolve
                video.onerror = resolve
            })

            await hideElement(video)
        }
    }

    await wait(1000)
    readConfig()
}

/* ===================== */
/* TRANSITIONS FUNCTIONS */
/* ===================== */

const showElement = async (container, element, duration = 0) => {
    container.innerHTML = ""
    container.appendChild(element)

    element.classList.add("media-item")

    // Force repaint
    element.offsetHeight
    element.classList.add("show")

    if (duration > 0) {
        await wait(duration)
        await hideElement(element)
    }
}

const hideElement = async (element) => {
    element.classList.remove("show")
    await wait(TRANSITION_DURATION)
}

/* ===================== */

const noMediaFound = () => {
    document.getElementById("media").innerHTML =
        `<p>No media found (png, jpg, mp4...)</p>`
}

const fileExists = async (url) => {
    try {
        const r = await fetch(url, { method: "HEAD", cache: "no-store" })
        return r.ok
    } catch {
        return false
    }
}

const wait = (ms) => new Promise(r => setTimeout(r, ms))

initApp()
</script>
  
<style>
body {
    margin: 0;
    background: black;
}

#media {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MEDIA ELEMENTS */
.media-item {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.media-item.show {
    opacity: 1;
}

p {
    color: white;
    font-size: 60px;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
}
</style>

</body>
</html>
