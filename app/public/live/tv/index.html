<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaporama</title>
</head>
<body>
    <div class="container">
        <div id="media" class="media"></div>
    </div>

<script>
var data = null;
var TRANSITION_DURATION = 500; // ms

function initApp() {
    try {
        var params = new URLSearchParams(window.location.search);
        var id = params.get("s");

        if (!id) {
            window.location.href = "./";
            return;
        }

        localStorage.setItem("screen", id);
        startLoop();

    } catch(e) {
        noMediaFound();
        wait(1000000);
    }
}

function startLoop() {
    (function loop() {
        load(function() {
            addLogs(function() {
                showMedia(function() {
                    setTimeout(loop, 0);
                });
            });
        });
    })();
}

function load(callback) {
    try {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "../backend/medias.php", true);
        xhr.setRequestHeader("Cache-Control", "no-store");
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        data = JSON.parse(xhr.responseText);
                        showMedia(callback);
                    } catch(e) {
                        console.error(e);
                        callback();
                    }
                } else {
                    console.error("Erreur lors du chargement des médias");
                    callback();
                }
            }
        };
        xhr.send();
    } catch (e) {
        console.error(e);
        callback();
    }
}

function showMedia(callback) {
    var container = document.getElementById("media");
    var screenId = localStorage.getItem("screen");
    var screen = null;

    if (data && data.length > 0) {
        for (var i=0; i<data.length; i++) {
            if (data[i].id == screenId) {
                screen = data[i];
                break;
            }
        }
    }

    if (!(screen && screen.images && screen.images.length > 0)) {
        noMediaFound();
        return wait(10000, callback);
    }

    if (screen.restart == 1) {
        window.location.reload();
        return;
    }

    (function showNext(index) {
        if (index >= screen.images.length) {
            return wait(1000, callback);
        }

        var item = screen.images[index];
        var url = "../images/" + screen.id + "/" + item;

        fileExists(url, function(exists) {
            if (!exists) {
                showNext(index + 1);
                return;
            }

            // IMAGE
            if (item.match(/\.(png|jpg|jpeg)$/i)) {
                var img = document.createElement("img");
                img.src = url;
                showElement(container, img, (screen.duration || 10) * 1000, function() {
                    showNext(index + 1);
                });
            }

            // VIDEO
            else if (item.match(/\.(mp4)$/i)) {
                var video = document.createElement("video");
                video.src = url;
                video.autoplay = true;
                video.muted = true;
                video.playsInline = true;

                showElement(container, video, 0, function() {
                    video.onended = video.onerror = function() {
                        hideElement(video, function() {
                            showNext(index + 1);
                        });
                    };
                });
            } else {
                showNext(index + 1);
            }
        });

    })(0);
}

function addLogs(filename, callback) {
    if (!callback && typeof filename === "function") {
        callback = filename;
    }
    if (callback) callback();
}

function showElement(container, element, duration, callback) {
    if (!callback && typeof duration === "function") {
        callback = duration;
        duration = 0;
    }

    container.innerHTML = "";
    container.appendChild(element);
    element.className += " media-item";

    // Force repaint
    element.offsetHeight;
    element.className += " show";

    if (duration > 0) {
        wait(duration, function() {
            hideElement(element, callback);
        });
    } else if (callback) {
        callback();
    }
}

function hideElement(element, callback) {
    element.className = element.className.replace(/\bshow\b/, "");
    wait(TRANSITION_DURATION, callback);
}

function noMediaFound() {
    try {
        document.getElementById("media").innerHTML = '<p>No media found (png, jpg, mp4...)</p>';
    } catch(e) {
        console.error(e);
    }
}

function fileExists(url, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open("HEAD", url, true);
    xhr.setRequestHeader("Cache-Control", "no-store");
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            callback(xhr.status >= 200 && xhr.status < 300);
        }
    };
    xhr.send();
}

function wait(ms, callback) {
    setTimeout(callback || function(){}, ms);
}

initApp();
</script>

<style>
body {
    margin: 0;
    background: black;
    cursor: none;
}

#media {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MEDIA ELEMENTS */
.media-item {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    will-change: opacity;
}

.media-item.show {
    opacity: 1;
}

p {
    color: white;
    font-size: 60px;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
}
</style>

</body>
</html>
