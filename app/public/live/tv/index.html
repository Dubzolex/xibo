<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaporama</title>
</head>
<body>
    <div class="container">
        <div id="media" class="media"></div>
    </div>

<script>

var screenId = null;
var data = null;
var TRANSITION_DURATION = 500;


function initApp() {
    try {
        var params = new URLSearchParams(window.location.search);
        screenId = params.get("s") || 1;

        if (!screenId) {
            throw new Error("No screen selected");
        }

        localStorage.setItem("screen", screenId);
        startLoop();

    } catch (e) {
        showMessage(e && e.message ? e.message : "Erreur inconnue");
        wait(30000, function () {
            window.location.reload();
        });
    }
}

function startLoop() {
    function loop() {
        try {
            load(function (err) {
                if (err) return handleError(err);

                addLogs(function () {
                    showMedia(function (err) {
                        if (err) return handleError(err);
                        loop(); // boucle infinie comme ES6
                    });
                });
            });
        } catch (e) {
            handleError(e);
        }
    }

    loop();
}

function handleError(e) {
    console.error(e);
    showMessage(e && e.message ? e.message : "Erreur inconnue");

    wait(30000, function () {
        window.location.reload();
    });
}

function load(callback) {
    try {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "../media.php?dir=" + screenId, true);
        xhr.setRequestHeader("Cache-Control", "no-store");

        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        data = JSON.parse(xhr.responseText);
                        callback();
                    } catch (e) {
                        callback(new Error("JSON invalide"));
                    }
                } else {
                    callback(new Error("Erreur serveur"));
                }
            }
        };

        xhr.send();
    } catch (e) {
        callback(new Error("Serveur problem: " + e.message));
    }
}

function showMedia(callback) {
    var container = document.getElementById("media");

    try {
        if (data && data.updating == 1) {
            return callback(new Error("Screen is updating..."));
        }

        if (!(data && data.images && data.images.length > 0)) {
            return callback(new Error("No media found (png, jpg, mp4...)"));
        }

        var i = 0;

        function next() {
            if (i >= data.images.length) {
                return callback();
            }

            var item = data.images[i++];
            var url = "../../images/" + screenId + "/" + item;

            fileExists(url, function (exists) {
                if (!exists) return next();

                // IMAGE
                if (item.match(/\.(png|jpg|jpeg)$/i)) {
                    var img = document.createElement("img");
                    img.src = url;

                    showElement(container, img, (data.duration || 10) * 1000, next);
                }

                // VIDEO
                else if (item.match(/\.(mp4)$/i)) {
                    var video = document.createElement("video");
                    video.src = url;
                    video.autoplay = true;
                    video.muted = true;
                    video.playsInline = true;

                    showElement(container, video, 0, function () {
                        video.onended = video.onerror = function () {
                            hideElement(video, function () {
                                wait(1000, next);
                            });
                        };
                    });
                } else {
                    next();
                }
            });
        }

        next();

    } catch (e) {
        callback(e);
    }
}

function addLogs(callback) {
    if (callback) callback();
}

function showElement(container, element, duration, callback) {
    container.innerHTML = "";
    container.appendChild(element);

    element.className += " media-item";

    element.offsetHeight; // repaint
    element.className += " show";

    if (duration > 0) {
        wait(duration, function () {
            hideElement(element, callback);
        });
    } else if (callback) {
        callback();
    }
}

function hideElement(element, callback) {
    element.className = element.className.replace(/\bshow\b/, "");
    wait(TRANSITION_DURATION, callback);
}

function showMessage(message) {
    document.getElementById("media").innerHTML = "<p>" + message + "</p>";
}

function fileExists(url, callback) {
    try {
        var xhr = new XMLHttpRequest();
        xhr.open("HEAD", url, true);
        xhr.setRequestHeader("Cache-Control", "no-store");

        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                callback(xhr.status >= 200 && xhr.status < 300);
            }
        };

        xhr.send();
    } catch (e) {
        console.warn(e);
        callback(false);
    }
}

function wait(ms, callback) {
    setTimeout(callback || function () {}, ms);
}

initApp();

</script>

<style>
body {
    margin: 0;
    background: black;
    cursor: none;
}

#media {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MEDIA ELEMENTS */
.media-item {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    will-change: opacity;
}

.media-item.show {
    opacity: 1;
}

p {
    color: white;
    font-size: 60px;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
}
</style>

</body>
</html>
