<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaporama</title>
</head>
<body>
    <div class="container">
        <div id="media" class="media"></div>
    </div>
    
<script>

let screenId = null
let data = null
const TRANSITION_DURATION = 500 // ms


const initApp = async () => {
    try {
        const params = new URLSearchParams(window.location.search)
        screenId = params.get("s") ?? 1

        if (!screenId) {
            throw new Error("No screen selected")
        }

        localStorage.setItem("screen", screenId)
        await startLoop()

    } catch(e) {
        showMessage(e?.message || "Erreur inconnue")
        await wait(30000)
        window.location.reload()
    }
}

const startLoop = async () => {
    while (true) {
        try {
            await load()
            await addLogs()
            await showMedia()

        } catch (e) {
            console.error(e)
            showMessage(e.message)
            await wait(30000)
            window.location.reload()
        }
    }
}

const load = async () => {
    try {
        const file = await fetch(`./media.php?dir=${screenId}`, { cache: "no-store" })
        data = await file.json()
        console.log(data)
    } catch (e) {
        throw new Error("Serveur problem: " + e.message)
    }
}

const showMedia = async () => {
    const container = document.getElementById("media")
    
    try {
        if (data.updating == 1) {
            throw new Error("Screen is updating...")
        }

        if(!(data && data.images && data.images.length > 0)) {
            throw new Error("No media found (png, jpg, mp4...)")
        }

        for (let item of data.images) {
            try {
                const url = `../images/${screenId}/${item}`
        
                if (await fileExists(url)) {
                        // IMAGE
                    if (item.match(/\.(png|jpg|jpeg)$/i)) {
                        const img = document.createElement("img")
                        img.src = url
            
                        await showElement(container, img, (data.duration ?? 10) * 1000)
                    }
            
                    // VIDEO
                    if (item.match(/\.(mp4)$/i)) {
                        const video = document.createElement("video")
                        video.src = url
                        video.autoplay = true
                        video.muted = true
                        video.playsInline = true
            
                        await showElement(container, video)
            
                        await new Promise(resolve => {
                            video.onended = resolve
                            video.onerror = resolve
                        })
            
                        await hideElement(video)
                        await wait(1000)
                    }
                }
        
            } catch(e) {
                console.error(e)
            }
        }

    } catch(e) {
        throw e
    }
}

const addLogs = async (filename = null) => {

}

const showElement = async (container, element, duration = 0) => {
    container.innerHTML = ""
    container.appendChild(element)

    element.classList.add("media-item")

    // Force repaint
    element.offsetHeight
    element.classList.add("show")

    if (duration > 0) {
        await wait(duration)
        await hideElement(element)
    }
}

const hideElement = async (element) => {
    element.classList.remove("show")
    await wait(TRANSITION_DURATION)
}

const showMessage = (message) => {
    document.getElementById("media").innerHTML = `<p>${message}</p>`
}

const fileExists = async (url) => {
    try {
        const r = await fetch(url, { method: "HEAD", cache: "no-store" })
        return r.ok
    } catch {
        return false
    }
}

const wait = (ms) => new Promise(r => setTimeout(r, ms))

initApp()

</script>
  
<style>
body {
    margin: 0;
    background: black;
    cursor: none;
}

#media {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MEDIA ELEMENTS */
.media-item {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    will-change: opacity;
}

.media-item.show {
    opacity: 1;
}

p {
    color: white;
    font-size: 60px;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
}
</style>

</body>
</html>
