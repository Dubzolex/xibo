<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/style.css" rel="styleSheet">
    <title>Login</title>
</head>
<body>
    <header>
        <div class="fx-row jc-center grow">
            <h1>XIBO</h1>
        </div>
        
    </header>
    <section class="fx-col fx-center">
        <div class="fx-col jc-between ai-center container w-400 h-500 p-20 form">
            <h3>Welcome !</h3>
            <div class="fx-col ai-center gap-40">
                <div class="fx-col gap-10">
                    <div>Email :</div>
                    <input type="email" id="input-email" placeholder="">
                </div>
                <div class="fx-col gap-10">
                    <div>Password :</div>
                    <input type="password" id="input-password" placeholder="">
                </div>
                <div id="status"></div>
            </div>
            <div class="fx-col ai-center gap-20">
                <a class="link" href="https://forms.office.com/Pages/ResponsePage.aspx?id=CDbAgGRfu0CccJOUq-YBHPcNcvYrXmxAjd-Pb3F9CwhUQ0IwT0E1TFFHTkRLSUY2TzlZTDMyREhGTS4u&r26868e63daf642288200ae1c132507da=%22Affichage%20Dynamique%22&r508386bf771f4868a87c7d26a929eaf5=%22Cr%C3%A9er%20un%20compte%22">Create account</a>
                <a class="link" href="https://forms.office.com/Pages/ResponsePage.aspx?id=CDbAgGRfu0CccJOUq-YBHPcNcvYrXmxAjd-Pb3F9CwhUQ0IwT0E1TFFHTkRLSUY2TzlZTDMyREhGTS4u&r26868e63daf642288200ae1c132507da=%22Affichage%20Dynamique%22&r508386bf771f4868a87c7d26a929eaf5=%22Oublier%20le%20mot%20de%20passe%22" _blanck>Forget password</a>
            </div>
            <button id="login" class="action">Login</button>
        </div>
    </section>
</body>
<script src="script.js" type="module"></script>
</html>
