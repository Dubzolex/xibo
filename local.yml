version: "3.8"

services:
  nginx:
    image: nginx:1.29-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./app:/var/www/html:ro
      - ./media:/var/www/html/public/images:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - webnet
    restart: unless-stopped

  php:
    user: "1000:100"
    build: .
    container_name: php
    volumes:
      - ./app:/var/www/html
      - ./media:/var/www/html/public/images
      - ./php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - webnet
    restart: unless-stopped

  db:
    image: mariadb:11
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: digital_signage
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - webnet
    restart: unless-stopped

networks:
  webnet:
    driver: bridge

volumes:
  db_data:
